<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFAD60;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#grad)"/>
  <text x="450" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#fff" text-anchor="middle" filter="url(#glow)">quionie</text>
  <text x="450" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="3">MARKETING &amp; GROWTH MEETS CODE</text>
</svg>
